<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e11d48">
  <title>Sem internet — Nosso Mural</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff1f2 0%, #fce7f3 50%, #fdf2f8 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #881337;
      padding: 24px;
    }
    .card {
      max-width: 340px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(244,63,94,0.15);
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(244,63,94,0.1);
    }
    .heart {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #9f1239;
    }
    p {
      font-size: 14px;
      color: #be123c;
      opacity: 0.7;
      line-height: 1.5;
    }
    .retry {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #f43f5e, #e11d48);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(225,29,72,0.3);
    }
    .retry:active { transform: scale(0.95); }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="heart">💔</div>
    <h1>Sem internet, meu bem...</h1>
    <p>Parece que a conexão caiu, mas nosso amor não cai nunca. Tente novamente em breve!</p>
    <a href="/" class="retry">Tentar de novo</a>
  </div>
</body>
</html>
